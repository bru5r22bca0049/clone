{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4 p-4 mt-5">

            <div class="text-center mb-4">

                <h2 class="fw-bold">
                    Welcome Back 👋
                </h2>

                <p class="text-muted">
                    Login to your account
                </p>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control form-control-lg rounded-3"
                           placeholder="Enter username"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control form-control-lg rounded-3"
                           placeholder="Enter password"
                           required>

                </div>

                <div class="d-grid">

                    <button type="submit"
                            class="btn btn-warning btn-lg rounded-3 fw-bold">

                        Login

                    </button>

                </div>

            </form>

            <hr class="my-4">

            <div class="text-center">

                <p class="mb-0">

                    Don't have an account?

                    <a href="{% url 'register' %}"
                       class="text-decoration-none fw-bold">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
